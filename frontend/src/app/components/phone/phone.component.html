<div class="phone" aria-label="Apercu d'un ecran d'accueil Android stylise">
  <div class="phone-button phone-button-volume" aria-hidden="true"></div>
  <div class="phone-button phone-button-power" aria-hidden="true"></div>

  <div class="phone-screen">
    <div class="phone-camera" aria-hidden="true"></div>

    <div class="phone-status-bar" aria-hidden="true">
      <span class="phone-time">10:49</span>

      <div class="phone-status-icons">
        <span class="signal-bars"></span>
        <span class="wifi-icon"></span>
        <span class="battery-pill">63</span>
      </div>
    </div>

    <div class="wallpaper wallpaper-top" aria-hidden="true"></div>
    <div class="wallpaper wallpaper-bottom" aria-hidden="true"></div>

    <div class="phone-content">
      <div class="widget-grid" aria-hidden="true">
        <section class="widget weather-widget">
          <div class="weather-cloud"></div>
          <div class="weather-text">
            <strong>9°</strong>
            <span>Rain possible today</span>
            <small>London</small>
          </div>
        </section>

        <div class="widget-column">
          <section class="widget brief-widget">
            <div class="brief-badge"></div>
            <span>Now brief</span>
          </section>

          <section class="widget start-widget">
            <span>Get<br>started</span>
            <div class="start-rings"></div>
          </section>
        </div>
      </div>

      <div class="search-widget" aria-hidden="true">
        <span class="google-mark">G</span>
        <div class="search-actions">
          <span class="search-mic"></span>
          <span class="search-lens"></span>
        </div>
      </div>

      <div class="apps-panel" aria-hidden="true">
        <div class="apps-row primary-apps">
          @for (icon of primaryApps; track icon.label) {
            <div class="app-item">
              <span class="app-icon-shell">
                <img
                  class="app-image"
                  [ngSrc]="icon.src"
                  [alt]="icon.alt"
                  width="52"
                  height="52"
                >
              </span>
              <span class="app-label">{{ icon.label }}</span>
            </div>
          }
        </div>

        <div class="page-indicators">
          <span></span>
          <span class="active"></span>
          <span></span>
        </div>
      </div>

      <div class="dock">
        <span
          class="dock-icon-shell badge-anchor"
          [matBadge]="phoneBadgeCount()"
          [matBadgeHidden]="phoneBadgeCount() === 0"
          matBadgeColor="warn"
          matBadgeSize="small"
          matBadgeOverlap="true"
          aria-label="Application Telephone"
        >
          <img
            class="dock-image"
            [ngSrc]="phoneIcon.src"
            [alt]="phoneIcon.alt"
            width="52"
            height="52"
          >
        </span>

        <button
          type="button"
          class="dock-icon-button badge-anchor"
          [matBadge]="smsBadgeCount()"
          [matBadgeHidden]="smsBadgeCount() === 0"
          matBadgeColor="warn"
          matBadgeSize="small"
          matBadgeOverlap="true"
          aria-label="Ouvrir le menu SMS"
          [attr.aria-expanded]="smsMenuOpen()"
          aria-controls="sms-menu-panel"
          (click)="toggleSmsMenu()"
        >
          <img
            class="dock-image"
            [ngSrc]="smsIcon.src"
            [alt]="smsIcon.alt"
            width="52"
            height="52"
          >
        </button>

        <span class="dock-icon-shell" aria-label="Application Internet">
          <img
            class="dock-image"
            [ngSrc]="internetIcon.src"
            [alt]="internetIcon.alt"
            width="52"
            height="52"
          >
        </span>

        <span class="dock-icon-shell" aria-label="Application Camera">
          <img
            class="dock-image"
            [ngSrc]="cameraIcon.src"
            [alt]="cameraIcon.alt"
            width="52"
            height="52"
          >
        </span>
      </div>

      @if (smsMenuOpen()) {
        <section class="sms-menu" id="sms-menu-panel" aria-label="Menu SMS rapide">
          <div class="sms-menu-header">
            <strong>SMS</strong>
            <button type="button" class="sms-menu-close" (click)="closeSmsMenu()" aria-label="Fermer le menu SMS">Fermer</button>
          </div>
          <p class="sms-menu-text">Menu SMS en construction. Nous pourrons ajouter conversations, notifications et actions ensuite.</p>
        </section>
      }

      <div class="system-nav" aria-hidden="true">
        <span class="nav-recent"></span>
        <span class="nav-home"></span>
        <span class="nav-back"></span>
      </div>

      <div class="gesture-bar" aria-hidden="true"></div>
    </div>
  </div>
</div>
