<div class="road" [class.road-running]="running()" aria-label="Route de jeu simplifiee en noir et blanc">
  <div class="road-center-line" aria-hidden="true"></div>

  <div #trafficLane class="traffic-lane" aria-hidden="true">
    @for (car of queuedCars(); track car.id) {
      <div class="car car-queued" [style.top.px]="car.top">
        <div class="car-window"></div>
        <div class="car-light car-front-light car-front-light-left"></div>
        <div class="car-light car-front-light car-front-light-right"></div>
        <div class="car-light car-rear-light car-rear-light-left"></div>
        <div class="car-light car-rear-light car-rear-light-right"></div>
        <div class="car-wheel car-wheel-front-left"></div>
        <div class="car-wheel car-wheel-front-right"></div>
        <div class="car-wheel car-wheel-rear-left"></div>
        <div class="car-wheel car-wheel-rear-right"></div>
      </div>
    }
  </div>

  <div class="car" aria-hidden="true">
    <div class="car-window"></div>
    <div class="car-light car-front-light car-front-light-left"></div>
    <div class="car-light car-front-light car-front-light-right"></div>
    <div class="car-light car-rear-light car-rear-light-left"></div>
    <div class="car-light car-rear-light car-rear-light-right"></div>
    <div class="car-wheel car-wheel-front-left"></div>
    <div class="car-wheel car-wheel-front-right"></div>
    <div class="car-wheel car-wheel-rear-left"></div>
    <div class="car-wheel car-wheel-rear-right"></div>
  </div>
</div>
