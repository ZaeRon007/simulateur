<app-header [showProfileButton]="false"></app-header>

<main class="auth-form-layout">
  <mat-card class="auth-form-card" appearance="raised">
    <h1>Se connecter</h1>

    <form [formGroup]="loginForm" (ngSubmit)="submit()" novalidate>
      <mat-form-field appearance="outline">
        <mat-label>email ou nom d'utilisateur</mat-label>
        <input matInput type="text" formControlName="identifier" autocomplete="username" />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>password</mat-label>
        <input matInput type="password" formControlName="password" autocomplete="current-password" />
      </mat-form-field>

      @if (errorMessage()) {
        <p class="form-error" role="alert">{{ errorMessage() }}</p>
      }

      <button mat-flat-button color="primary" type="submit" [disabled]="loginForm.invalid || isSubmitting()">
        se connecter
      </button>
    </form>
  </mat-card>
</main>
