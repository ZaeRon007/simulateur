<app-header [showProfileButton]="false"></app-header>

<main class="auth-form-layout">
  <div class="back-nav">
    <button
      class="back-button"
      mat-stroked-button
      type="button"
      aria-label="Revenir a la page precedente"
      (click)="goBack()"
    >
      <mat-icon class="material-symbols-outlined" aria-hidden="true">arrow_back</mat-icon>
    </button>
  </div>

  <mat-card class="auth-form-card" appearance="raised">
    <h1>S'enregistrer</h1>

    <form [formGroup]="registerForm" (ngSubmit)="submit()" novalidate>
      <mat-form-field appearance="outline">
        <mat-label>nom d'utilisateur</mat-label>
        <input matInput type="text" formControlName="name" autocomplete="username" />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>email</mat-label>
        <input matInput type="email" formControlName="email" autocomplete="email" />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>mot de passe</mat-label>
        <input matInput type="password" formControlName="password" autocomplete="new-password" />
      </mat-form-field>

      @if (errorMessage()) {
        <p class="form-error" role="alert">{{ errorMessage() }}</p>
      }

      <button mat-flat-button color="primary" type="submit" [disabled]="registerForm.invalid || isSubmitting()">
        s'enregistrer
      </button>
    </form>
  </mat-card>
</main>
