spring.application.name=simulateur

spring.datasource.url=jdbc:mysql://localhost:3306/simBDD?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=user
spring.datasource.password=user
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

security.jwt.secret-key=${security.jwt.secret-key:ChangeThisSecretKeyForJwtTokenSigning123456789}
security.jwt.expiration-time=${security.jwt.expiration-time:3600}

app.cors.allowed-origins=http://localhost:4200,http://localhost:4200/
